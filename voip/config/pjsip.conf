[global]
type=global
user_agent=Asterisk PBX

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
cert_file=/etc/asterisk/keys/asterisk.crt
priv_key_file=/etc/asterisk/keys/asterisk.key
cipher=ECDHE-RSA-AES256-GCM-SHA384,ECDHE-RSA-AES128-GCM-SHA256
method=tlsv1_2

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
local_net=10.0.0.0/8

[webrtc_endpoint](!)
type=endpoint
transport=transport-wss
context=from-internal
disallow=all
allow=opus,ulaw,alaw,vp8
dtls_verify=fingerprint
dtls_setup=actpass
dtls_rekey=0
ice_support=yes
media_encryption=dtls
use_avpf=yes
rtcp_mux=yes
rewrite_contact=yes
force_rport=yes

[auth_user](!)
type=auth
auth_type=userpass

[aor_dynamic](!)
type=aor
max_contacts=1
remove_existing=yes

[6001](auth_user)
username=6001
password=password123
[6001](aor_dynamic)
[6001](webrtc_endpoint)
auth=6001
aors=6001

[6002](auth_user)
username=6002
password=password123
[6002](aor_dynamic)
[6002](webrtc_endpoint)
auth=6002
aors=6002
