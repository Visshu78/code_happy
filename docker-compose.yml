services:
  # 1. Voice Engine
  livekit:
    image: livekit/livekit-server:latest
    container_name: voice_engine
    command: --config /livekit.yaml --dev --node-ip 100.97.80.94
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit-voice/livekit.yaml:/livekit.yaml

  # 2. Backend
  backend:
    build: ./backend
    container_name: voice_api
    restart: always
    environment:
      - PORT=3000
    depends_on:
      - livekit

  # 3. Frontend
  frontend:
    build: ./frontend
    container_name: voice_web
    restart: always
    depends_on:
      - backend

  # 4. NGINX Reverse Proxy (New)
  nginx:
    image: nginx:latest
    container_name: voice_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
      - livekit
