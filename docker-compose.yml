services:
  # 1. Voice Engine
  livekit:
    image: livekit/livekit-server:latest
    container_name: voice_engine
    command: --config /livekit.yaml --dev
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit-voice/livekit.yaml:/livekit.yaml

  # 2. Authentication API
  backend:
    build: ./backend
    container_name: voice_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    depends_on:
      - livekit

  # 3. User Interface (Web Server)
  frontend:
    build: ./frontend
    container_name: voice_web
    restart: always
    ports:
      - "8000:80"  # We map port 8000 on laptop to port 80 inside container
    depends_on:
      - backend